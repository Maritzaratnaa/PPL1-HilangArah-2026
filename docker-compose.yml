version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: arahin_db
    restart: always
    environment:
      MYSQL_DATABASE: arahin_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    
volumes:
  db_data: