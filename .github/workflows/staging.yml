name: Staging CI/CD (Dev Branch) # Nama disesuaikan agar jelas ini untuk branch dev

on:
  push:
    branches:
      - dev # Workflow akan otomatis berjalan saat ada kode baru masuk ke dev
  workflow_dispatch: # Tetap bisa dijalankan secara manual jika butuh

jobs:
  build-and-integrate:
    name: Integration Test FE & BE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETUP DATABASE (Tanpa working-directory karena docker-compose.yml ada di luar)
      - name: Create Env File
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

      # 2. SETUP & JALANKAN BACKEND
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
          
      - name: Install Backend Deps
        working-directory: backend
        run: npm install

      - name: Run Backend Server
        working-directory: backend
        run: npm start & 
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          PORT: 3000
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # 3. SETUP & JALANKAN FRONTEND
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'FrontEnd/pnpm-lock.yaml'

      - name: Install Frontend Deps
        working-directory: FrontEnd
        run: pnpm install

      - name: Run Frontend Server
        working-directory: FrontEnd
        run: pnpm run dev &
        env:
          VITE_API_URL: http://localhost:3000

      # 4. FINAL CHECK
      - name: Verify Integration
        run: |
          echo "Menunggu server stabil..."
          sleep 20
          # Pastikan backend ARAHIN merespons
          curl -f http://localhost:3000 || exit 1
          # Pastikan frontend Vite merespons
          curl -f http://localhost:8080 || exit 1