name: Integration Test # Nama ini yang akan muncul di badge atau tab Actions

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Memungkinkan menjalankan manual

jobs:
  # Job tunggal untuk mengecek apakah integrasi FE & BE aman
  build-and-integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETUP DATABASE (Tanpa working-directory karena docker-compose.yml ada di luar)
      - name: Start Database
        run: |
          docker compose up -d
          sleep 20 

      # 2. SETUP & JALANKAN BACKEND
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
          
      - name: Install Backend Deps
        working-directory: backend # Masuk ke folder backend karena package.json ada di sini
        run: npm install

      - name: Run Backend Server
        working-directory: backend
        run: npm start & 
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: rootpassword
          DB_NAME: arahin_db
          PORT: 3000
          JWT_SECRET: bebop

      # 3. SETUP & JALANKAN FRONTEND
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'FrontEnd/pnpm-lock.yaml'

      - name: Install Frontend Deps
        working-directory: FrontEnd # Pastikan huruf besar-kecilnya benar (FrontEnd)
        run: pnpm install

      - name: Run Frontend Server
        working-directory: FrontEnd
        run: pnpm run dev &
        env:
          VITE_API_URL: http://localhost:3000

      # 4. FINAL CHECK
      - name: Verify Integration
        run: |
          sleep 15
          curl -f http://localhost:3000 || exit 1
          curl -f http://localhost:8080 || exit 1
