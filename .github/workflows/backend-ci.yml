name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "backend"]
    # Hanya jalan jika ada file di dalam folder backend yang berubah
    paths:
      - 'backend/**' 
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    # Runner: Server virtual yang digunakan GitHub
    runs-on: ubuntu-latest

    # Setup agar semua perintah di bawah ini dijalankan di dalam folder backend
    defaults:
      run:
        working-directory: ./backend

    steps:
    # 1. Mengambil kode dari repository kamu
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    # 4. Menjalankan pengujian (script test yang kita ubah tadi)
    - name: Run tests
      run: npm test